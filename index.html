  bindEvents(el){
    // Expandir días a favor
    el.querySelectorAll('.vac-expand-btn').forEach(btn=>{
      btn.addEventListener('click', e=>{
        const opId = e.currentTarget.dataset.opId;
        const det = document.getElementById('compDet_'+opId);
        if(!det) return;
        const open = det.style.display !== 'none';
        det.style.display = open ? 'none' : '';
        e.currentTarget.classList.toggle('open', !open);
      });
    });

    // Botón nueva fecha grupal
    document.getElementById('btnNuevoGrupo')?.addEventListener('click', ()=>{
      this.grupoEnCurso = { fecha: HOY, operadores: [] };
      this.render();
    });

    // Cancelar editor
    document.getElementById('btnCancelarGrupo')?.addEventListener('click', ()=>{
      this.grupoEnCurso = null;
      this.render();
    });

    // Cambiar fecha del grupo en curso
    document.getElementById('grupoFechaInput')?.addEventListener('change', e=>{
      this.grupoEnCurso.fecha = e.target.value;
      this.render();
    });

    // Agregar operario al grupo en curso
    document.getElementById('grupoAddOpSel')?.addEventListener('change', e=>{
      const opId = e.target.value;
      if(!opId) return;
      this.grupoEnCurso.operadores.push({ operadorId:opId, horarioDesde:'', horarioHasta:'' });
      this.render();
    });

    // Editar horarios en grupo en curso
    el.querySelectorAll('.comp-horario').forEach(input=>{
      input.addEventListener('change', e=>{
        const idx = parseInt(e.target.dataset.idx);
        const campo = e.target.dataset.campo;
        this.grupoEnCurso.operadores[idx][campo] = e.target.value;
      });
    });

    // Quitar operario del grupo en curso
    el.querySelectorAll('.comp-del-op').forEach(btn=>{
      btn.addEventListener('click', e=>{
        const idx = parseInt(e.currentTarget.dataset.idx);
        this.grupoEnCurso.operadores.splice(idx, 1);
        this.render();
      });
    });

    // Confirmar grupo
    document.getElementById('btnConfirmarGrupo')?.addEventListener('click', ()=>{
      const g = this.grupoEnCurso;
      if(!g.fecha){ Toast.show('Elegí una fecha para el grupo'); return; }
      if(g.operadores.length===0){ Toast.show('Agregá al menos un operario'); return; }

      Modal.open({
        title:'Confirmar asignación grupal',
        bodyHTML:`<p>Se va a sumar <strong>1 crédito compensatorio</strong> a <strong>${g.operadores.length} operarios</strong> por la fecha <strong>${DateUtil.formatShort(g.fecha)}</strong>.</p>`,
        confirmText:'Confirmar',
        onConfirm:()=>{
          const grupoId = 'grp_'+Date.now();
          // guardar el grupo
          DB.gruposCompensatorios.push({ id:grupoId, fecha:g.fecha, operadores:[...g.operadores], confirmado:true });
          // crear un crédito por operario
          g.operadores.forEach(row=>{
            DB.compensatorios.push({
              id:'c_'+Date.now()+'_'+row.operadorId,
              operadorId:row.operadorId,
              fechaOrigen:g.fecha,
              origenTipo:'grupal',
              grupoId
            });
          });
          Toast.show(`${g.operadores.length} créditos asignados`);
          this.grupoEnCurso = null;
          this.render();
          Bus.emit();
        }
      });
    });

    // Editar grupo confirmado (abre el editor con los datos del grupo)
    el.querySelectorAll('.comp-btn-editar-grupo').forEach(btn=>{
      btn.addEventListener('click', e=>{
        const grupoId = e.currentTarget.dataset.grupoId;
        const g = DB.gruposCompensatorios.find(g=> g.id===grupoId);
        if(!g) return;
        // Nota: editar un grupo confirmado permite agregar/quitar operarios
        // y ajustar horarios. Los créditos se recalculan al re-confirmar.
        Modal.open({
          title:'Editar grupo',
          bodyHTML:`<p>Vas a entrar al modo de edición del grupo del <strong>${DateUtil.formatShort(g.fecha)}</strong>.<br>Podés agregar o quitar operarios y cambiar horarios. Los créditos se actualizarán al re-confirmar.</p>`,
          confirmText:'Editar',
          onConfirm:()=>{
            // Borrar créditos del grupo anterior y traer los datos al editor
            DB.compensatorios = DB.compensatorios.filter(c=> c.grupoId !== grupoId);
            DB.gruposCompensatorios = DB.gruposCompensatorios.filter(g=> g.id!==grupoId);
            this.grupoEnCurso = { fecha:g.fecha, operadores:[...g.operadores] };
            this.render();
            Bus.emit();
          }
        });
      });
    });

    // Exportar Excel del grupo
    el.querySelectorAll('.comp-btn-excel-grupo').forEach(btn=>{
      btn.addEventListener('click', e=>{
        const grupoId = e.currentTarget.dataset.grupoId;
        const g = DB.gruposCompensatorios.find(g=> g.id===grupoId);
        if(!g) return;
        const filas = g.operadores.map(row=>{
          const op = Domain.getOperador(row.operadorId);
          return {
            'Nombre': op ? op.apellidoNombre : row.operadorId,
            'Fecha': g.fecha,
            'Horario desde': row.horarioDesde || '',
            'Horario hasta': row.horarioHasta || '',
          };
        });
        const ws = XLSX.utils.json_to_sheet(filas);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Compensatorios');
        XLSX.writeFile(wb, `compensatorios_${g.fecha}.xlsx`);
        Toast.show('Excel exportado');
      });
    });

    // Borrar grupo confirmado
    el.querySelectorAll('.comp-btn-borrar-grupo').forEach(btn=>{
      btn.addEventListener('click', e=>{
        const grupoId = e.currentTarget.dataset.grupoId;
        const g = DB.gruposCompensatorios.find(g=> g.id===grupoId);
        if(!g) return;
        Modal.open({
          title:'Borrar grupo',
          bodyHTML:`<p>¿Confirmás borrar el grupo del <strong>${DateUtil.formatShort(g.fecha)}</strong>? Se eliminarán los ${g.operadores.length} créditos asignados a partir de este grupo.</p>`,
          confirmText:'Borrar',
          onConfirm:()=>{
            DB.compensatorios = DB.compensatorios.filter(c=> c.grupoId!==grupoId);
            DB.gruposCompensatorios = DB.gruposCompensatorios.filter(g=> g.id!==grupoId);
            Toast.show('Grupo eliminado');
            this.render();
            Bus.emit();
          }
        });
      });
    });

    // Asignación individual
    document.getElementById('btnConfirmarInd')?.addEventListener('click', ()=>{
      const opId = document.getElementById('compIndOpSel').value;
      const fecha = document.getElementById('compIndFechaInput').value;
      if(!opId){ Toast.show('Elegí un operario'); return; }
      Modal.open({
        title:'Confirmar crédito individual',
        bodyHTML:`<p>Se va a sumar <strong>1 crédito compensatorio</strong> a <strong>${this.esc(Domain.getOperador(opId)?.apellidoNombre||'')}</strong>${fecha ? ` por el día <strong>${DateUtil.formatShort(fecha)}</strong>` : ' <em>(sin fecha)</em>'}.</p>`,
        confirmText:'Confirmar',
        onConfirm:()=>{
          DB.compensatorios.push({
            id:'c_'+Date.now(),
            operadorId:opId,
            fechaOrigen:fecha||'',
            origenTipo:'individual',
          });
          document.getElementById('compIndOpSel').value = '';
          document.getElementById('compIndFechaInput').value = '';
          Toast.show('Crédito individual asignado');
          this.render();
          Bus.emit();
        }
      });
    });
  }
};

Router.renderers.compensatorios = () => ViewCompensatorios.render();

   view-hoy.js — PESTAÑA 4: Día de hoy
   ======================================================================= */

const ViewHoy = {
  orden: 'nombre', // nombre | sector

  render(){
    const el = document.getElementById('view-hoy');
    let amOps = DB.operadores.filter(o=> o.turno === 'AM' && o.sector !== 'Coordinacion');
    let pmOps = DB.operadores.filter(o=> o.turno === 'PM' && o.sector !== 'Coordinacion');
    let coordOps = DB.operadores.filter(o=> o.sector === 'Coordinacion');

    const comparador = this.orden === 'sector'
      ? (a,b)=> (a.sector||'').localeCompare(b.sector||'') || a.apellidoNombre.localeCompare(b.apellidoNombre)
      : (a,b)=> a.apellidoNombre.localeCompare(b.apellidoNombre);
    amOps = [...amOps].sort(comparador);
    pmOps = [...pmOps].sort(comparador);
    coordOps = [...coordOps].sort(comparador);

    const alerts = Domain.proximosEventos();
    const vacMes = Domain.vacacionesDelProximoMes();

    el.innerHTML = `
      <div class="hoy-fecha-bar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        ${DateUtil.formatLong(HOY)}
        <label class="hoy-orden-label">Ordenar
          <select id="hoyOrdenSel" class="hoy-orden-select">
            <option value="nombre" ${this.orden==='nombre'?'selected':''}>Alfabético</option>
            <option value="sector" ${this.orden==='sector'?'selected':''}>Por sector</option>
          </select>
        </label>
      </div>

      <div class="hoy-grid ${coordOps.length === 0 ? 'no-coord' : ''}">
        <div class="panel hoy-block" data-turno="AM">
          <div class="panel-head"><h2><span class="tag tag-am">AM</span> Mañana</h2><span class="count">${amOps.length}</span></div>
          <div id="hoyListAM"></div>
        </div>
        <div class="panel hoy-block" data-turno="PM">
          <div class="panel-head"><h2><span class="tag tag-pm">PM</span> Tarde</h2><span class="count">${pmOps.length}</span></div>
          <div id="hoyListPM"></div>
        </div>
        ${coordOps.length > 0 ? `
        <div class="panel hoy-block" data-turno="COORD">
          <div class="panel-head"><h2><span class="tag tag-coord">COORD</span> Coordinadores</h2><span class="count">${coordOps.length}</span></div>
          <div id="hoyListCOORD"></div>
        </div>` : ''}
        <div class="hoy-side-col">
          <div class="panel">
            <div class="panel-head"><h2>Próximos eventos</h2><span class="count">${alerts.length}</span></div>
            <div class="hoy-alerts">
              ${alerts.length === 0
                ? `<div class="empty-state">No hay vacaciones ni licencias por empezar o terminar próximamente.</div>`
                : alerts.map(a=> `<div class="hoy-alert-item"><span class="alert-dot"></span>${a.texto}</div>`).join('')
              }
            </div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>Vacaciones del mes</h2>
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="count">${vacMes.length}</span>
                ${vacMes.length > 0 ? `<button class="btn btn-sm" id="btnExportarVacMes">Excel</button>` : ''}
              </div>
            </div>
            <div class="hoy-alerts">
              ${vacMes.length === 0
                ? `<div class="empty-state">Sin vacaciones para el mes próximo.</div>`
                : vacMes.map(v=> `<div class="hoy-alert-item"><span class="alert-dot" style="background:var(--vacation);"></span><strong>${this.esc(v.operador)}</strong> — del ${DateUtil.formatShort(v.desde)} al ${DateUtil.formatShort(v.hasta)} (${v.dias}d)</div>`).join('')
              }
            </div>
          </div>
        </div>
      </div>
    `;

    this.injectStyles();
    document.getElementById('hoyListAM').innerHTML = this.listHTML(amOps);
    document.getElementById('hoyListPM').innerHTML = this.listHTML(pmOps);
    const coordList = document.getElementById('hoyListCOORD');
    if(coordList) coordList.innerHTML = this.listHTML(coordOps);
    this.bindSwitches(el);
    const btnExp = document.getElementById('btnExportarVacMes');
    if(btnExp) btnExp.addEventListener('click', ()=> this.onExportarVacMes(vacMes));
    const ordenSel = document.getElementById('hoyOrdenSel');
    if(ordenSel) ordenSel.addEventListener('change', (e)=>{ this.orden = e.target.value; this.render(); });
  },

  listHTML(ops){
    if(ops.length === 0) return `<div class="empty-state">Sin operarios en este turno.</div>`;
    return `
      <table class="hoy-table">
        <tbody>
          ${ops.map(op=> this.rowHTML(op)).join('')}
        </tbody>
      </table>
    `;
  },

  rowHTML(op){
    // Solo vacaciones y licencia bloquean la fila (ausente sigue permitiendo togglear el switch)
    const bloqueante = DB.eventos.find(e=> e.operadorId===op.id && e.fecha===HOY &&
      (e.tipo==='vacaciones' || e.tipo==='licencia'));
    if(bloqueante){
      const bloque = Domain.bloqueConsecutivo(op.id, HOY, bloqueante.tipo);
      const etiquetaTipo = bloqueante.tipo === 'vacaciones' ? 'vacaciones' : 'licencia';
      const hastaTxt = bloque ? ` hasta ${DateUtil.formatDDMM(bloque.hasta)}-${DateUtil.parse(bloque.hasta).getFullYear()}` : '';
      const claseTipo = bloqueante.tipo === 'vacaciones' ? 'estado-vacaciones' : 'estado-licencia';
      return `
        <tr class="hoy-row is-blocked">
          <td class="col-nombre">${this.esc(op.apellidoNombre)}</td>
          <td class="col-estado ${claseTipo}">${etiquetaTipo}${hastaTxt}</td>
        </tr>
      `;
    }
    // franco con fecha de goce hoy también bloquea solo el día
    const franco = DB.eventos.find(e=> e.operadorId===op.id && e.fecha===HOY && e.tipo==='franco');
    if(franco){
      return `
        <tr class="hoy-row is-blocked">
          <td class="col-nombre">${this.esc(op.apellidoNombre)}</td>
          <td class="col-estado estado-licencia" style="background:var(--sage-soft);color:var(--sage);">compensatorio</td>
        </tr>
      `;
    }

    const asistKey = `${op.id}_${HOY}`;
    const estado = DB.asistenciaHoy[asistKey] || 'presente';
    return `
      <tr class="hoy-row">
        <td class="col-nombre">${this.esc(op.apellidoNombre)}</td>
        <td class="col-estado">
          <div class="asist-switch" data-operador-id="${op.id}">
            <button class="asist-btn ${estado==='presente'?'is-active presente':''}" data-estado="presente">Presente</button>
            <button class="asist-btn ${estado==='ausente'?'is-active ausente':''}" data-estado="ausente">Ausente</button>
          </div>
        </td>
      </tr>
    `;
  },

  esc(s){ return (s||'').toString().replace(/"/g,'&quot;'); },

  onExportarVacMes(vacMes){
    const filas = vacMes.map(v=> ({
      'Operario': v.operador,
      'Desde': v.desde,
      'Hasta': v.hasta,
      'Días': v.dias,
    }));
    const ws = XLSX.utils.json_to_sheet(filas);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Vacaciones del mes');
    XLSX.writeFile(wb, `vacaciones_proximo_mes_${HOY}.xlsx`);
    Toast.show('Excel exportado');
  },

  injectStyles(){
    if(document.getElementById('hoyStyles')) return;
    const style = document.createElement('style');
    style.id = 'hoyStyles';
    style.textContent = `
      .hoy-fecha-bar{ display:flex; align-items:center; gap:7px; font-family:var(--f-mono); font-size:11.5px; color:var(--ink-dim); margin-bottom:14px; text-transform:capitalize; }
      .hoy-orden-label{ margin-left:auto; display:flex; align-items:center; gap:6px; font-size:11.5px; text-transform:none; font-family:var(--f-body); }
      .hoy-orden-select{ width:auto; padding:4px 8px; font-size:11.5px; }
      .hoy-grid{ display:grid; grid-template-columns:repeat(4, 0.85fr); gap:12px; align-items:start; }
      .hoy-grid.no-coord{ grid-template-columns:1.15fr 1.15fr 0.9fr; }
      @media (max-width:1300px){ .hoy-grid{ grid-template-columns:1fr 1fr; } .hoy-side-col{ grid-column:1 / -1; } }
      @media (max-width:720px){ .hoy-grid{ grid-template-columns:1fr; } }
      .hoy-side-col{ display:flex; flex-direction:column; gap:14px; }

      .hoy-table{ width:100%; border-collapse:collapse; }
      .hoy-row td{ padding:7px 13px; border-bottom:1px solid var(--line); font-size:11.5px; }
      .hoy-row:last-child td{ border-bottom:none; }
      .hoy-row .col-nombre{ font-weight:600; width:55%; font-size:11.5px; }
      .hoy-row.is-blocked .col-nombre{ color:var(--ink-dim); }
      .col-estado{ text-align:right; }
      .estado-vacaciones, .estado-licencia{
        display:inline-block; font-size:10.2px; font-weight:600; padding:3.5px 8px; border-radius:20px;
      }
      .estado-vacaciones{ background:var(--vacation-soft); color:#8A6520; }
      .estado-licencia{ background:var(--brick-soft); color:var(--brick); }

      .asist-switch{ display:inline-flex; border:1px solid var(--line); border-radius:20px; overflow:hidden; }
      .asist-btn{ border:none; background:var(--white); padding:4.5px 10px; font-size:10.2px; font-weight:600; color:var(--ink-dim); transition:background .12s,color .12s; cursor:pointer; }
      .asist-btn.is-active.presente{ background:var(--sage); color:#fff; }
      .asist-btn.is-active.ausente{ background:var(--brick); color:#fff; }

      .hoy-alerts{ padding:5px 0; }
      .hoy-alert-item{ display:flex; align-items:center; gap:8px; padding:8px 15px; font-size:11.5px; border-bottom:1px solid var(--line); }
      .hoy-alert-item:last-child{ border-bottom:none; }
      .alert-dot{ width:5px; height:5px; border-radius:50%; background:var(--steel); flex:0 0 5px; }
    `;
    document.head.appendChild(style);
  },

  bindSwitches(el){
    el.querySelectorAll('.asist-switch').forEach(group=>{
      group.querySelectorAll('.asist-btn').forEach(btn=>{
        btn.addEventListener('click', ()=> this.onToggleAsistencia(group.dataset.operadorId, btn.dataset.estado));
      });
    });
  },

  onToggleAsistencia(operadorId, estado){
    const key = `${operadorId}_${HOY}`;
    DB.asistenciaHoy[key] = estado;

    // impacta en el calendario: pinta o borra la celda de "ausente" para hoy
    DB.eventos = DB.eventos.filter(e=> !(e.operadorId===operadorId && e.fecha===HOY && e.tipo==='ausente'));
    if(estado === 'ausente'){
      DB.eventos.push({ id:'ev_aus_'+operadorId, operadorId, fecha:HOY, tipo:'ausente' });
    }

    const op = Domain.getOperador(operadorId);
    Toast.show(`${op ? op.apellidoNombre : 'Operario'} marcado como ${estado}`);
    this.render();
    Bus.emit();
  }
};

Router.renderers.hoy = () => ViewHoy.render();

            </button>
          </div>
        </div>
      </div>
    `;

      .an-op-remove:hover{ opacity:1; color:var(--brick); }
      .an-op-cards{ display:flex; flex-wrap:wrap; gap:8px; flex:1; }

      .an-card-foot{ display:flex; align-items:center; justify-content:space-between; }
      .an-card-date{ font-family:var(--f-mono); font-size:10.5px; color:var(--ink-dim); }
      .an-card-actions{ display:flex; gap:6px; }
      .an-card-actions button{ background:none; border:none; color:var(--ink-dim); padding:2px; opacity:.6; }
      .an-card-actions button:hover{ opacity:1; color:var(--steel); }

      .an-card-add{ display:flex; align-items:center; gap:5px; justify-content:center; background:transparent; border:1px dashed var(--line); color:var(--ink-dim); font-size:11.5px; font-weight:600; min-width:90px; align-self:stretch; }
      .an-card-add:hover{ border-color:var(--steel); color:var(--steel); background:var(--steel-soft); }

      #anNotasGenerales{ min-height:140px; font-size:13px; line-height:1.5; }
    `;
    document.head.appendChild(style);
  },

  bindEvents(el){
    el.querySelectorAll('[data-action="add-card"]').forEach(btn=>{
      btn.addEventListener('click', (e)=> this.openCardModal(e.currentTarget.dataset.id, null));
    });
    el.querySelectorAll('[data-action="edit-card"]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const tarjeta = DB.anotaciones.find(a=> a.id === e.currentTarget.dataset.id);
        if(tarjeta) this.openCardModal(tarjeta.operadorId, tarjeta);
      });
    });
    el.querySelectorAll('[data-action="del-card"]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        DB.anotaciones = DB.anotaciones.filter(a=> a.id !== e.currentTarget.dataset.id);

        this.render();
      });
    });
    el.querySelectorAll('.an-op-remove').forEach(btn=>{
      btn.addEventListener('click', (e)=>{

        this.render();
      });

    const notas = document.getElementById('anNotasGenerales');

      let timer;
      notas.addEventListener('input', ()=>{

        timer = setTimeout(()=>{
          DB.notasGenerales = notas.value;
          Toast.show('Notas guardadas');
        }, 600);
      });

        </div>
      `,
      confirmText: tarjetaExistente ? 'Guardar cambios' : 'Agregar tarjeta',
      onConfirm:(body)=>{
        const texto = body.querySelector('#cardTextoInput').value.trim();
        if(!texto) return false;
        if(tarjetaExistente){
          tarjetaExistente.texto = texto;
          Toast.show('Anotación actualizada');
        } else {
          DB.anotaciones.push({ id:'an_'+Date.now(), operadorId, texto, fecha: HOY });
          Toast.show('Anotación agregada');
        }
        this.render();
      }
    });
  }
};

              <tbody>
                ${opsConFr.map(op=> this.francoRowsHTML(op, histFr[op.id])).join('')}

        <div class="panel">
          <div class="panel-head"><h2>Vacaciones disfrutadas</h2><span class="count">${opsConVac.length}</span></div>
          <div class="scroll-x">
            ${opsConVac.length === 0 ? `<div class="empty-state">Sin vacaciones vencidas.</div>` : `
            <table class="hist-table">
              <thead><tr><th>Operario</th><th>Fecha</th><th>Días</th><th></th></tr></thead>
              <tbody>
                ${opsConVac.map(op=> this.vacRowsHTML(op, histVac[op.id])).join('')}
              </tbody>
            </table>`}

        <div class="panel">
          <div class="panel-head"><h2>Ausencias y licencias</h2><span class="count">${opsConAus.length}</span></div>
          <div class="scroll-x">
            ${opsConAus.length === 0 ? `<div class="empty-state">Sin registros pasados.</div>` : `
            <table class="hist-table">
              <thead><tr><th>Operario</th><th>Aus.</th><th>Lic.</th></tr></thead>
              <tbody>
                ${opsConAus.map(op=> this.ausRowHTML(op, histAus[op.id])).join('')}

            </table>`}
          </div>
        </div>
      </div>

  francoRowsHTML(op, data){

      <tr data-evento-id="${e.id}">
        <td class="col-nombre">${i===0 ? this.esc(op.apellidoNombre) : ''}</td>

            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--brick)" stroke-width="2"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14"/></svg>
          </button>
        </td>

  vacRowsHTML(op, data){

      </tr>

  },

  ausRowHTML(op, data){

    return `
      <tr>
        <td class="col-nombre">${this.esc(op.apellidoNombre)}</td>
        <td>
          <button class="hist-counter" data-toggle="${rowId}-aus">${data.ausencias.length}</button>

        <td>
          <button class="hist-counter" data-toggle="${rowId}-lic">${data.licencias.length}</button>

        <td></td>
        <td colspan="2">
          ${data.ausencias.length === 0 ? '<span class="hint-text">Sin ausencias registradas</span>' :
            data.ausencias.map(e=> `<span class="hist-detail-chip">${DateUtil.formatShort(e.fecha)} <button class="chip-del" data-evento-id="${e.id}" data-action="del-evento">×</button></span>`).join(' ')}
        </td>
      </tr>
      <tr id="${rowId}-lic" class="hist-detail-row" style="display:none;">
        <td></td>
        <td colspan="2">
          ${data.licencias.length === 0 ? '<span class="hint-text">Sin licencias registradas</span>' :
            data.licencias.map(e=> `<span class="hist-detail-chip">${DateUtil.formatShort(e.fecha)} <button class="chip-del" data-evento-id="${e.id}" data-action="del-evento">×</button></span>`).join(' ')}
        </td>
      </tr>
    `;
  },

  esc(s){ return (s||'').toString().replace(/"/g,'&quot;'); },

  injectStyles(){
    if(document.getElementById('histStyles')) return;
    const style = document.createElement('style');
    style.id = 'histStyles';
    style.textContent = `
      .hist-cols-3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
      @media (max-width:1100px){ .hist-cols-3{ grid-template-columns:1fr 1fr; } }
      @media (max-width:680px){ .hist-cols-3{ grid-template-columns:1fr; } }

      .hist-table{ border-collapse:collapse; width:100%; font-size:12px; }
      .hist-table th, .hist-table td{ border-bottom:1px solid #EEEAE0; border-right:1px solid #EEEAE0; padding:7px 10px; text-align:left; }
      .hist-table thead th{ background:var(--paper-dim); font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-dim); }
      .hist-table td.col-nombre{ font-weight:600; min-width:170px; }

      .hist-counter{ background:var(--paper-dim); border:1px solid var(--line); border-radius:20px; padding:4px 11px; font-size:11.5px; font-weight:600; color:var(--ink); cursor:pointer; }
      .hist-counter:hover{ background:var(--steel-soft); border-color:var(--steel); }
      .hist-detail-row td{ background:#FBFAF7; padding:8px 10px; }
      .hist-detail-chip{ display:inline-flex; align-items:center; gap:5px; background:var(--white); border:1px solid var(--line); border-radius:14px; padding:3px 4px 3px 10px; font-family:var(--f-mono); font-size:11px; margin:2px 4px 2px 0; }
      .hint-text{ font-size:11px; color:var(--ink-dim); font-style:italic; }
    `;
    document.head.appendChild(style);
  },

  bindEvents(el){
    el.querySelectorAll('.row-delete-hist').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const id = e.currentTarget.dataset.eventoId;
        Modal.open({
          title:'Quitar del historial',
          bodyHTML:`<p>Este registro se va a ocultar del historial. El evento sigue marcado en el Calendario.</p>`,
          confirmText:'Quitar',
          onConfirm:()=>{
            DB.historialOcultos.push(id);
            Toast.show('Registro quitado del historial');
            this.render();
            Bus.emit();
          }
        });
      });
    });
    el.querySelectorAll('.row-delete-hist-bloque').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const ids = e.currentTarget.dataset.ids.split(',');
        Modal.open({
          title:'Quitar del historial',
          bodyHTML:`<p>Este bloque de vacaciones se va a ocultar del historial (${ids.length} día${ids.length===1?'':'s'}). El evento sigue marcado en el Calendario.</p>`,
          confirmText:'Quitar',
          onConfirm:()=>{
            DB.historialOcultos.push(...ids);
            Toast.show('Bloque quitado del historial');
            this.render();
            Bus.emit();
          }
        });
      });
    });
    el.querySelectorAll('[data-action="del-evento"]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const id = e.currentTarget.dataset.eventoId;
        DB.historialOcultos.push(id);
        Toast.show('Registro quitado del historial');
        this.render();
        Bus.emit();
      });
    });
    el.querySelectorAll('[data-toggle]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const targetId = e.currentTarget.dataset.toggle;
        const row = document.getElementById(targetId);
        if(row) row.style.display = row.style.display === 'none' ? '' : 'none';
      });
    });
  }
};

  rowHTML(u){

    return `
      <tr>
        <td class="col-nombre">${this.esc(u.usuario)}</td>
        <td><span class="usr-rol-pill usr-rol-${u.rol}">${etiquetaRol}</span></td>
        <td>

            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--brick)" stroke-width="2"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14"/></svg>
          </button>
        </td>
      </tr>
    `;
  },

  esc(s){ return (s||'').toString().replace(/"/g,'&quot;'); },

  injectStyles(){
    if(document.getElementById('usrStyles')) return;
    const style = document.createElement('style');
    style.id = 'usrStyles';
    style.textContent = `
      .usr-form-row{ display:flex; align-items:flex-end; gap:14px; padding:16px 18px; flex-wrap:wrap; }
      .usr-form-row .field input, .usr-form-row .field select{ width:200px; }
      .usr-table{ border-collapse:collapse; width:100%; font-size:12.5px; }
      .usr-table th, .usr-table td{ border-bottom:1px solid var(--line); padding:9px 18px; text-align:left; }
      .usr-table thead th{ background:var(--paper-dim); font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-dim); }
      .usr-table td.col-nombre{ font-weight:600; }
      .usr-rol-pill{ display:inline-block; font-size:10.5px; font-weight:600; padding:3px 10px; border-radius:20px; }
      .usr-rol-total{ background:var(--steel-soft); color:var(--steel); }
      .usr-rol-parcial{ background:var(--umber-soft); color:var(--umber); }
    `;
    document.head.appendChild(style);
  },

  bindEvents(el){
    const btnCrear = document.getElementById('btnCrearUsuario');
    if(btnCrear){
      btnCrear.addEventListener('click', async ()=>{
        const usuario = document.getElementById('nuevoUsuarioInput').value.trim();
        const pass = document.getElementById('nuevoPassInput').value;
        const rol = document.getElementById('nuevoRolSel').value;
        const errorEl = document.getElementById('crearUsuarioError');
        errorEl.style.display = 'none';

        if(!usuario || !pass){
          errorEl.textContent = 'Completá usuario y contraseña.';
          errorEl.style.display = 'block';
          return;
        }
        if(pass.length < 6){
          errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres.';
          errorEl.style.display = 'block';
          return;
        }

        btnCrear.disabled = true;
        btnCrear.textContent = 'Creando...';
        const res = await crearUsuario(usuario, pass, rol);
        btnCrear.disabled = false;
        btnCrear.textContent = 'Crear usuario';

        if(res.ok){
          Toast.show(`Usuario "${usuario}" creado`);
          this.render();
        } else {
          errorEl.textContent = res.msg;
          errorEl.style.display = 'block';
        }
      });
    }

    el.querySelectorAll('.row-delete-usr').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const usuarioId = e.currentTarget.dataset.usuarioId;
        const nombre = e.currentTarget.dataset.usuarioNombre;
        Modal.open({
          title:'Eliminar usuario',
          bodyHTML:`<p>¿Confirmás eliminar el acceso de <strong>${this.esc(nombre)}</strong>? La cuenta deja de poder iniciar sesión inmediatamente.</p>`,
          confirmText:'Eliminar',
          onConfirm:async ()=>{
            await borrarUsuario(usuarioId);
            Toast.show('Usuario eliminado');
            this.render();
          }
        });
      });
    });
  }
};

              <thead><tr><th>Columna</th><th>Qué muestra</th></tr></thead>
              <tbody>
                <tr><td><strong>Operador (Xd)</strong></td><td>Nombre y total de días de crédito cargados</td></tr>
                <tr><td><strong>Asignadas (en calendario)</strong></td><td>Días ya asignados en el calendario que aún no se disfrutaron</td></tr>
                <tr><td><strong>Disponibles</strong></td><td>Días que todavía quedan libres para asignar</td></tr>
              </tbody>
            </table>
            <p class="man-p">La flecha ▾ al lado de cada nombre despliega el detalle de períodos. Los períodos agotados aparecen tachados.</p>
            <h3 class="man-h3">Cargar créditos a un operario</h3>
            <div class="man-pasos">
              <div class="man-paso"><span class="man-num">1</span>Seleccioná el operario en el formulario superior.</div>
              <div class="man-paso"><span class="man-num">2</span>Elegí el período (ej: 2026/2027).</div>
              <div class="man-paso"><span class="man-num">3</span>Elegí la cantidad de días: 7, 14, 21 o 28.</div>
              <div class="man-paso"><span class="man-num">4</span>Hacé clic en "Confirmar carga" y confirmá el modal.</div>
            </div>
            <p class="man-p">Si el operario ya tenía crédito para ese período, los días se <strong>suman</strong>. Si no tenía, se crea un lote nuevo.</p>
            <h3 class="man-h3">Asignar a todos</h3>
            <div class="man-pasos">
              <div class="man-paso"><span class="man-num">1</span>Hacé clic en "+ Asignar a todos".</div>
              <div class="man-paso"><span class="man-num">2</span>Elegí el período y la cantidad de días.</div>
              <div class="man-paso"><span class="man-num">3</span>Confirmá — cada operario recibe individualmente esa cantidad.</div>
            </div>
            <h3 class="man-h3">Lógica de descuento (FIFO)</h3>
            <div class="man-card">
              <p class="man-p" style="margin:0;">Al asignar días en el Calendario, se descuenta automáticamente empezando por el <strong>período más antiguo</strong> con saldo disponible.</p>
              <p class="man-p" style="margin:8px 0 0;"><strong>Ejemplo:</strong> Palermo tiene 7 días del período 2024/2025 y 14 del 2025/2026. Al asignar 10 días en el calendario, se consumen los 7 del período viejo + 3 del siguiente.</p>
            </div>
            <h3 class="man-h3">Qué pasa cuando las vacaciones vencen</h3>
            <ul class="man-list">
              <li><strong>Calendario:</strong> la celda cambia a color gris opaco (ya disfrutadas).</li>
              <li><strong>Pestaña Vacaciones:</strong> esos días dejan de contar en "Disponibles".</li>
              <li><strong>Historial:</strong> quedan registrados automáticamente.</li>
            </ul>
            <div class="man-nota">📌 Si borrás un lote de crédito que ya tenía días asignados en el calendario, el sistema borra automáticamente los días futuros para que el saldo no quede negativo, y te avisa cuántos quitó.</div>
          </section>

          <!-- 5 -->
          <section id="man-5" class="manual-section">
            <h2 class="man-h2">5. Pestaña: Compensatorios</h2>
            <p class="man-p">Gestiona los días a favor que los operarios obtienen por trabajar en días no laborables.</p>
            <h3 class="man-h3">Concepto</h3>
            <p class="man-p">Un <strong>compensatorio</strong> es un crédito acumulado por haber trabajado un día extra o en feriado. Ese crédito se canjea luego por un <strong>franco compensatorio</strong> — un día libre que consume el crédito.</p>
            <h3 class="man-h3">Asignación grupal por fecha</h3>
            <div class="man-pasos">
              <div class="man-paso"><span class="man-num">1</span>Hacé clic en "+ Nueva fecha".</div>
              <div class="man-paso"><span class="man-num">2</span>Seleccioná la fecha del día trabajado.</div>
              <div class="man-paso"><span class="man-num">3</span>Agregá los operarios uno a uno. Para cada uno podés indicar el rango horario.</div>
              <div class="man-paso"><span class="man-num">4</span>Hacé clic en "Confirmar grupo". Cada operario recibe 1 crédito vinculado a esa fecha.</div>
            </div>
            <p class="man-p">Mientras la fecha no haya pasado, el cuadro permanece con botones de <strong>Editar</strong>, <strong>Exportar Excel</strong> y <strong>Borrar</strong>.</p>
            <div class="man-nota">📌 El Excel del grupo incluye columnas: Nombre, Fecha, Horario desde, Horario hasta — ideal para enviar por correo como registro.</div>
            <h3 class="man-h3">Asignación individual</h3>
            <div class="man-pasos">
              <div class="man-paso"><span class="man-num">1</span>Seleccioná el operario.</div>
              <div class="man-paso"><span class="man-num">2</span>Ingresá una fecha (opcional) o dejá en blanco para "sin fecha".</div>
              <div class="man-paso"><span class="man-num">3</span>Hacé clic en "Confirmar". El operario recibe 1 crédito.</div>
            </div>
            <h3 class="man-h3">Cuadro "Días a favor"</h3>
            <p class="man-p">Muestra solo los operarios con créditos disponibles (saldo &gt; 0). La flecha ▾ despliega el detalle de cada crédito: si es grupal o individual, la fecha de origen, y si ya fue tomado.</p>
            <h3 class="man-h3">Lógica de descuento (FIFO)</h3>
            <div class="man-card">
              <p class="man-p" style="margin:0;">Al asignar un franco en el Calendario, se consume <strong>automáticamente el crédito más antiguo</strong> disponible. Los créditos sin fecha se tratan como los más antiguos y se consumen primero.</p>
            </div>
            <div class="man-nota">📌 No podés asignar un franco si el operario no tiene créditos disponibles. El botón aparece deshabilitado.</div>
          </section>

          <!-- 6 -->
          <section id="man-6" class="manual-section">
            <h2 class="man-h2">6. Pestaña: Anotaciones</h2>
            <p class="man-p">Permite registrar novedades o notas por operario, y notas generales para el equipo.</p>
            <ul class="man-list">
              <li>Agregá operarios a la lista de seguimiento con el botón correspondiente.</li>
              <li>Para cada operario podés escribir anotaciones con fecha.</li>
              <li>Al pie hay un campo de <strong>"Notas generales"</strong> para observaciones que aplican a todo el grupo.</li>
            </ul>
          </section>

          <!-- 7 -->
          <section id="man-7" class="manual-section">
            <h2 class="man-h2">7. Pestaña: Base de operadores</h2>
            <p class="man-p">Registro maestro de todos los operarios con datos personales y operativos.</p>
            <h3 class="man-h3">Acciones disponibles</h3>
            <ul class="man-list">
              <li><strong>Editar:</strong> hacé clic en cualquier celda para modificar el dato directamente.</li>
              <li><strong>Nuevo operario:</strong> agrega una fila nueva para completar.</li>
              <li><strong>Exportar Excel:</strong> descarga toda la base en formato .xlsx.</li>
              <li><strong>Ordenar:</strong> por Nombre, Sector, Turno o Legajo usando el desplegable.</li>
            </ul>
            <div class="man-nota">📌 Los operarios del sector <strong>Coordinación</strong> aparecen en el cuadro "Coordinadores" en Día de hoy, Calendario y Vacaciones — separados de AM y PM.</div>
          </section>

          <!-- 8 -->
          <section id="man-8" class="manual-section">
            <h2 class="man-h2">8. Pestaña: Historial de eventos</h2>
            <p class="man-p">Muestra en tres cuadros paralelos el registro de eventos ya pasados. Se actualiza automáticamente sin acción manual.</p>
            <table class="man-table">
              <thead><tr><th>Cuadro</th><th>Qué muestra</th></tr></thead>
              <tbody>
                <tr><td><strong>Compensatorios tomados</strong></td><td>Francos cuya fecha de goce ya pasó, con fecha de origen y día tomado.</td></tr>

                <tr><td><strong>Ausencias y licencias</strong></td><td>Contador histórico por operario. Hacé clic en el número para ver el detalle de fechas.</td></tr>
              </tbody>
            </table>
            <div class="man-nota">📌 Podés quitar un registro del historial con el botón borrar, pero el evento sigue marcado en el Calendario.</div>
          </section>

          <!-- 9 -->

            <h3 class="man-h3">Crear un usuario nuevo</h3>
            <div class="man-pasos">
              <div class="man-paso"><span class="man-num">1</span>Ingresá el nombre de usuario (ej: jperez).</div>
              <div class="man-paso"><span class="man-num">2</span>Ingresá una contraseña (mínimo 6 caracteres). Se la pasás al usuario por fuera de la app.</div>
              <div class="man-paso"><span class="man-num">3</span>Seleccioná el permiso: "Permiso total" o "Permiso parcial".</div>
              <div class="man-paso"><span class="man-num">4</span>Hacé clic en "Crear usuario".</div>
            </div>
            <h3 class="man-h3">Borrar un usuario</h3>
            <p class="man-p">En la lista de usuarios, hacé clic en el ícono de borrar. El usuario pierde el acceso inmediatamente.</p>
            <h3 class="man-h3">Contraseña olvidada</h3>
            <p class="man-p">No hay recuperación desde la app. El admin debe borrar el usuario y crearlo de nuevo con nueva contraseña.</p>
            <h3 class="man-h3">Cambiar mi propia contraseña</h3>
            <p class="man-p">Cualquier usuario puede hacerlo desde el botón <strong>"Mi contraseña"</strong> en la barra superior. Se requiere ingresar la contraseña actual.</p>
          </section>

          <!-- 10 -->
          <section id="man-10" class="manual-section">
            <h2 class="man-h2">10. Resumen de lógicas y descuentos</h2>
            <h3 class="man-h3">Vacaciones — flujo completo</h3>
            <table class="man-table">
              <thead><tr><th>Paso</th><th>Acción</th><th>Efecto</th></tr></thead>
              <tbody>
                <tr><td>1</td><td>Cargar crédito en pestaña Vacaciones</td><td>Aparece saldo disponible para el operario</td></tr>
                <tr><td>2</td><td>Asignar días en el Calendario</td><td>Se descuenta del saldo (FIFO por período)</td></tr>
                <tr><td>3</td><td>Fecha pasa</td><td>Color opaco en Calendario, pasa automáticamente al Historial</td></tr>
              </tbody>
            </table>
            <h3 class="man-h3">Compensatorios — flujo completo</h3>
            <table class="man-table">
              <thead><tr><th>Paso</th><th>Acción</th><th>Efecto</th></tr></thead>
              <tbody>
                <tr><td>1</td><td>Asignar grupal o individual</td><td>Aparece crédito en "Días a favor"</td></tr>
                <tr><td>2</td><td>Asignar franco en el Calendario</td><td>Se descuenta el crédito más antiguo (FIFO)</td></tr>
                <tr><td>3</td><td>Fecha del franco pasa</td><td>Aparece en Historial como "Compensatorio tomado"</td></tr>
              </tbody>
            </table>
            <h3 class="man-h3">Reglas importantes</h3>
            <ul class="man-list">
              <li><strong>FIFO siempre:</strong> tanto vacaciones como compensatorios consumen primero el crédito más antiguo.</li>
              <li><strong>Un compensatorio = un día:</strong> solo se puede asignar un día suelto por vez como franco.</li>
              <li><strong>El Calendario es la fuente de verdad:</strong> los eventos vencidos quedan visibles en color opaco, nunca desaparecen solos.</li>
              <li><strong>El Historial es automático:</strong> no requiere acción manual, se actualiza cuando una fecha pasa.</li>
              <li><strong>Ausencias en "Día de hoy"</strong> se reflejan automáticamente en el Calendario del mismo día.</li>
              <li><strong>Ausencias pasadas</strong> se pueden corregir desde el Calendario seleccionando el día y eligiendo "Ausente".</li>
            </ul>
          </section>

        </div><!-- /manual-body -->
      </div><!-- /manual-wrap -->
    `;

/* =======================================================================
   auth.js — login con usuario/contraseña + arranque controlado de la app
   ======================================================================= */

let _appIniciada = false;

function usuarioToEmail(usuario){
  return usuario.trim().toLowerCase().replace(/\s+/g,'') + '@' + AUTH_EMAIL_DOMAIN;
}

function mostrarLogin(){
  document.getElementById('loginScreen').classList.remove('hidden');
}
function ocultarLogin(){
  document.getElementById('loginScreen').classList.add('hidden');
}

function iniciarApp(user){
  if(_appIniciada) return;
  _appIniciada = true;
  document.getElementById('whoUser').textContent = user.email.replace('@'+AUTH_EMAIL_DOMAIN,'');
  iniciarSincronizacion();
  Router.init();
}

function cerrarApp(){
  _appIniciada = false;
  detenerSincronizacion();
}

fbAuth.onAuthStateChanged(user=>{
  if(user){
    ocultarLogin();
    iniciarApp(user);
  } else {
    cerrarApp();
    mostrarLogin();
  }
});

document.getElementById('loginForm').addEventListener('submit', (e)=>{
  e.preventDefault();
  const usuario = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  const errorBox = document.getElementById('loginError');
  const loadingBox = document.getElementById('loginLoading');
  errorBox.classList.remove('show');
  loadingBox.classList.add('show');

  fbAuth.signInWithEmailAndPassword(usuarioToEmail(usuario), pass)
    .catch(err=>{
      let msg = 'No se pudo iniciar sesión. Revisá usuario y contraseña.';
      if(err.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Esperá unos minutos y volvé a intentar.';
      if(err.code === 'auth/network-request-failed') msg = 'Sin conexión a internet.';
      errorBox.textContent = msg;
      errorBox.classList.add('show');
    })
    .finally(()=>{
      loadingBox.classList.remove('show');
    });
});

document.getElementById('btnLogout').addEventListener('click', ()=>{
  fbAuth.signOut();
});

document.getElementById('btnCambiarPass').addEventListener('click', ()=>{
  Modal.open({
    title:'Cambiar mi contraseña',
    bodyHTML:`
      <div class="field">
        <label>Contraseña actual</label>
        <input type="password" id="passActualInput" autocomplete="current-password">
      </div>
      <div class="field">
        <label>Contraseña nueva (mínimo 6 caracteres)</label>
        <input type="password" id="passNuevaInput" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Repetir contraseña nueva</label>
        <input type="password" id="passNuevaRepInput" autocomplete="new-password">
      </div>
      <p id="passCambioError" style="color:var(--brick);font-size:12px;display:none;"></p>
    `,
    confirmText:'Cambiar contraseña',
    onConfirm:(body)=>{
      const actual = body.querySelector('#passActualInput').value;
      const nueva = body.querySelector('#passNuevaInput').value;
      const rep = body.querySelector('#passNuevaRepInput').value;
      const errorEl = body.querySelector('#passCambioError');
      const mostrarError = (msg)=>{ errorEl.textContent = msg; errorEl.style.display = 'block'; };

      if(!actual || !nueva || !rep){ mostrarError('Completá los tres campos.'); return false; }
      if(nueva !== rep){ mostrarError('Las contraseñas nuevas no coinciden.'); return false; }
      if(nueva.length < 6){ mostrarError('La contraseña nueva debe tener al menos 6 caracteres.'); return false; }

      cambiarMiPassword(actual, nueva).then(res=>{
        if(res.ok){ Toast.show('Contraseña actualizada'); Modal.close(); }
        else { mostrarError(res.msg); }
      });
      return false; // el cierre lo maneja la promesa de arriba
    }
  });
});
</script>
